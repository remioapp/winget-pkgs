ReleaseNotes: |-
  Remio Host 2.2.1 — about half the latency, a sharper picture, and fast
  recovery after network hiccups.

  - Cuts screen latency roughly in half on a home or office network —
    dragging, scrolling, and typing feel immediate.
  - Much sharper picture on your own network — your PC now streams at the
    full quality your connection allows instead of holding back at a fixed
    rate.
  - No more collapse on weak connections — slow or lossy links now hold a
    steady 60 frames per second and stay under a second of delay.
  - Better picture on PCs without a hardware video encoder.
  - Video recovers in about a second after a Wi-Fi drop or lost packet,
    instead of staying frozen for up to 30 seconds.
  - Fixed a permanent freeze when streaming a 4K screen.
  - Fixed quality silently dropping for days after reconnecting several
    times in a row.
ReleaseNotesUrl: https://github.com/remioapp/releases/releases/tag/v2.2.1-win
PurchaseUrl: https://remio.net/download.html
InstallationNotes: |-
  Remio Host installs to Program Files and registers a Windows Service (RemioHostSvc) that
  spawns the main app into your interactive session at sign-in. After install, look for
  the Remio icon in your system tray.
