ReleaseNotes: |-
  Remio Host 2.1.3 — types the way you do, updates without the nagging.

  - Vietnamese and other input methods now work correctly — characters typed
    from your phone, tablet, or Mac compose properly on the PC (Telex, UniKey,
    and other IMEs), instead of arriving as raw letters.
  - Smoother update experience — when an update is required, the host now
    shows a single clear notice instead of repeated prompts, and reconnects
    cleanly after you update.
ReleaseNotesUrl: https://github.com/remioapp/releases/releases/tag/v2.1.3-win
PurchaseUrl: https://remio.net/download.html
InstallationNotes: |-
  Remio Host installs to Program Files and registers a Windows Service (RemioHostSvc) that
  spawns the main app into your interactive session at sign-in. After install, look for
  the Remio icon in your system tray.
