ReleaseNotes: |-
  Remio Host 2.1.0 — rock-solid startup and remote control everywhere.

  - Reliable after restart — the host now comes online dependably every time
    Windows starts, so your PC is always reachable after a reboot.
  - Control admin apps and UAC prompts — remote input keeps working when an
    elevated window or UAC prompt takes focus, no extra setup needed.
  - Fixed a black screen when connecting to an idle or completely static
    desktop — video now appears immediately.
ReleaseNotesUrl: https://github.com/remioapp/releases/releases/tag/v2.1.0-win
PurchaseUrl: https://remio.net/download.html
InstallationNotes: |-
  Remio Host installs to Program Files and registers a Windows Service (RemioHostSvc) that
  spawns the main app into your interactive session at sign-in. After install, look for
  the Remio icon in your system tray.
