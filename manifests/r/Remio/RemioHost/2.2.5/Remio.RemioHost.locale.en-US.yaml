ReleaseNotes: |-
  Remio Host 2.2.5 - control admin windows, 4:4:4 color, and full
  quality on cloud PCs.

  - Remote input now works over administrator windows (installers,
    Task Manager, UAC-elevated apps) - clicks and keystrokes were
    previously dropped there silently.
  - Experimental 4:4:4 color streaming on NVIDIA graphics cards:
    pixel-exact color for fine text on colored backgrounds (enable
    "4:4:4 color" in the Mac client settings).
  - Full hardware video quality on cloud and rented PCs that refuse
    virtual displays - no more choppy half-rate mode.
  - Recovers automatically when video degrades to a slideshow.
  - Fixed the most common crash while video was starting up.
  - PCs with a broken graphics driver now stream with software video
    instead of appearing "Offline".
ReleaseNotesUrl: https://github.com/remioapp/releases/releases/tag/v2.2.5-win
PurchaseUrl: https://remio.net/download.html
InstallationNotes: |-
  Remio Host installs to Program Files and registers a Windows Service (RemioHostSvc) that
  spawns the main app into your interactive session at sign-in. After install, look for
  the Remio icon in your system tray.
